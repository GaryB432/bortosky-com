name: CI
on:
  push:
    branches: [master, feature/sveltekit]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      with:
        node-version: 16
      - name: npm install build and test
        run: |
          npm install
          npx nx lint site
          npx nx test:unit site --run
          npx nx build site
      - name: Archive production site
        uses: actions/upload-artifact@v3
        with:
          name: site-build
          path: packages/site/build
